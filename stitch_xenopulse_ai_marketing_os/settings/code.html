<body class="font-body-md text-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-xl docked full-width top-0 sticky z-40 border-b border-outline-variant/30 dark:border-white/10 flex justify-between items-center px-lg h-16 w-full max-w-container-max mx-auto">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high/50 transition-colors p-2 rounded-full">

<!-- Profile -->

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<div class="text-left">
<p class="font-label-md text-label-md text-on-surface">Profile</p>
<p class="text-xs text-on-surface-variant">Alex Executive • Marketing Director</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Organization -->

</div>
<div class="text-left">
<p class="font-label-md text-label-md text-on-surface">Organization</p>
<p class="text-xs text-on-surface-variant">Enterprise Tier • 24 Seats Active</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Development Section -->
<section>
<h3 class="font-label-sm text-label-sm text-primary uppercase tracking-widest px-2 mb-3">Integrations</h3>
<div class="settings-card rounded-xl overflow-hidden divide-y divide-white/5">
<!-- API Keys -->
<button class="w-full flex items-center justify-between p-4 hover:bg-white/5 transition-all group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="key">key</span>

</div>

</div>

</div>
</section>

<section>
<div class="mt-8 px-2">

<a class="flex flex-col items-center justify-center bg-primary-container/20 text-primary dark:text-primary-fixed-dim rounded-xl p-2 scale-90 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-label-sm text-label-sm mt-1">Settings</span>
</a>
</nav>
<script>
        // Micro-interaction for toggle
        const toggle = document.querySelector('.toggle-switch');
        toggle.addEventListener('change', function() {
            if (this.checked) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // Simple haptic feedback simulation on click for mobile feel
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
